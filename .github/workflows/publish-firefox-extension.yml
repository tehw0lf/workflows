name: publish firefox extension

on:
  workflow_call:
    secrets:
      AMO_API_KEY:
        required: false
      AMO_API_SECRET:
        required: false
    inputs:
      root_dir:
        description: "path to project root"
        default: "."
        required: false
        type: string
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
      addon_guid:
        description: "firefox addon guid"
        default: ""
        required: false
        type: string
      xpi_path:
        description: "firefox addon zip path"
        default: ""
        required: false
        type: string

jobs:
  publish_firefox_extension:
    name: publish firefox extension
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.root_dir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: package firefox extension
        run: zip -r ${{ inputs.xpi_path }} * -x .git\* -x .github\*
        shell: bash

      - name: publish firefox extension
        uses: wdzeng/firefox-addon@3184ee491b500e080885e046051366a4228c6e5d # v1.2.1
        with:
          addon-guid: ${{ inputs.addon_guid }}
          xpi-path: ${{ inputs.xpi_path }}
          self-hosted: false
          jwt-issuer: ${{ secrets.AMO_API_KEY }}
          jwt-secret: ${{ secrets.AMO_API_SECRET }}
