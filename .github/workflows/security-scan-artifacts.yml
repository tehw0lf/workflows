name: security scan artifacts

on:
  workflow_call:
    inputs:
      root_dir:
        description: "path to project root"
        default: "."
        required: false
        type: string
      tool:
        description: "build tool - ./gradlew || npm || yarn || mvn || uv || bash"
        default: "none"
        required: false
        type: string
      artifact_path:
        description: "path to artifact files to scan"
        default: ""
        required: false
        type: string
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
      trivy_severity:
        description: "minimum severity level for trivy (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)"
        default: "MEDIUM,HIGH,CRITICAL"
        required: false
        type: string
      trivy_exit_code:
        description: "exit code when vulnerabilities are found (0=continue, 1=fail)"
        default: "1"
        required: false
        type: string
      docker_meta:
        description: "docker metadata as json array ([{'name':'docker-image-name','file':'docker/app/Dockerfile'}])"
        default: ""
        required: false
        type: string
    outputs:
      trivy_fs_result:
        description: "trivy filesystem scan result"
        value: ${{ jobs.scan_artifacts.outputs.trivy_fs_result }}
      grype_result:
        description: "grype scan result"
        value: ${{ jobs.scan_artifacts.outputs.grype_result }}

jobs:
  scan_artifacts:
    name: scan build artifacts
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    outputs:
      trivy_fs_result: ${{ steps.trivy-fs.outcome }}
      grype_result: ${{ steps.grype.outcome }}
    defaults:
      run:
        working-directory: ${{ inputs.root_dir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Check if build artifacts exist
      - name: check if build artifact exists
        if: ${{ inputs.artifact_path != '' }}
        id: check-artifact
        uses: softwareforgood/check-artifact-v4-existence@f988c59be23773bdf226dffa5720d85a13501fba # v0.4.3
        with:
          name: build

      # Download build artifacts for scanning
      - name: download build artifact
        if: ${{ steps.check-artifact.outputs.exists == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: ${{ inputs.artifact_path }}

      # Layer 2a: Trivy filesystem scan (packages, dependencies, configs)
      - name: trivy filesystem scan
        id: trivy-fs
        if: ${{ inputs.artifact_path != '' && steps.check-artifact.outputs.exists == 'true' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "${{ inputs.artifact_path }}"
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "${{ inputs.trivy_severity }}"
          exit-code: "${{ inputs.trivy_exit_code }}"
        continue-on-error: false

      - name: upload trivy fs SARIF
        if: always() && steps.trivy-fs.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "trivy-filesystem"
        continue-on-error: true

      # Layer 2b: Grype scan (alternative/backup scanner)
      - name: grype filesystem scan
        id: grype
        if: ${{ inputs.artifact_path != '' && steps.check-artifact.outputs.exists == 'true' }}
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: "${{ inputs.artifact_path }}"
          fail-build: true
          severity-cutoff: medium
          output-format: sarif
        continue-on-error: false

      - name: upload grype SARIF
        if: always() && steps.grype.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: "grype"
        continue-on-error: true

      # Summary table generation
      - name: generate trivy report table
        if: always() && steps.trivy-fs.outcome != 'skipped'
        run: |
          echo "### 🔍 Trivy Filesystem Scan Results" >> $GITHUB_STEP_SUMMARY
          trivy fs --format table --severity ${{ inputs.trivy_severity }} ${{ inputs.artifact_path }} >> $GITHUB_STEP_SUMMARY || true
        continue-on-error: true

      - name: upload security scan reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-scan-artifact-reports
          path: |
            trivy-fs-results.sarif
            ${{ steps.grype.outputs.sarif }}
          if-no-files-found: ignore

      - name: cache trivy installation
        if: ${{ inputs.docker_meta != '' }}
        id: cache-trivy
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /usr/local/bin/trivy
            ~/.cache/trivy
          key: ${{ runner.os }}-trivy-v0.69.3
          restore-keys: |
            ${{ runner.os }}-trivy-

      - name: install trivy
        if: ${{ inputs.docker_meta != '' && steps.cache-trivy.outputs.cache-hit != 'true' }}
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3

      - name: set up docker
        if: ${{ inputs.docker_meta != '' }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: build and scan docker images
        if: ${{ inputs.docker_meta != '' }}
        run: |
          echo '${{ inputs.docker_meta }}' | jq -c '.[]' | while read -r image; do
            name=$(echo "$image" | jq -r '.name')
            file=$(echo "$image" | jq -r '.file')
            sanitized_name=$(echo "$name" | tr ':/' '--')

            echo "::notice::[Docker Scan] Building scan image for $name"
            docker buildx build \
              --file "$file" \
              --load \
              --platform linux/amd64 \
              --tag "$name:scan" \
              .

            echo "::notice::[Docker Scan] Scanning $name"
            trivy image \
              --format sarif \
              --output "trivy-image-${sanitized_name}.sarif" \
              --severity "${{ inputs.trivy_severity }}" \
              --exit-code ${{ inputs.trivy_exit_code }} \
              "$name:scan"

            echo "### 🔍 Trivy Docker Scan Results: $name" >> $GITHUB_STEP_SUMMARY
            trivy image \
              --format table \
              --severity "${{ inputs.trivy_severity }}" \
              "$name:scan" >> $GITHUB_STEP_SUMMARY || true

            docker rmi "$name:scan" || true
          done
        id: docker-scan

      - name: upload docker trivy SARIF
        if: always() && steps.docker-scan.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image-*.sarif
          category: trivy-docker-pre-publish
        continue-on-error: true

      - name: upload docker scan reports
        if: always() && steps.docker-scan.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-scan-reports
          path: trivy-image-*.sarif
          if-no-files-found: ignore
