name: security scan source

on:
  workflow_call:
    inputs:
      head_ref:
        description: "branch that triggered the workflow (pass github.head_ref from caller)"
        default: ""
        required: false
        type: string
      root_dir:
        description: "path to project root"
        default: "."
        required: false
        type: string
      tool:
        description: "build tool - ./gradlew || npm || yarn || mvn || uv || bash"
        default: "none"
        required: false
        type: string
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
      semgrep_rules:
        description: "semgrep ruleset (auto, p/security-audit, p/owasp-top-ten, p/ci, etc.)"
        default: "auto"
        required: false
        type: string
      npm_audit_omit_dev:
        description:
          "omit dev dependencies from npm audit (use when dev-only vulns have
          no upstream fix)"
        default: false
        required: false
        type: boolean
      npm_audit_severity_threshold:
        description: "minimum severity for npm audit to fail (low, moderate, high, critical)"
        default: "moderate"
        required: false
        type: string
    outputs:
      semgrep_result:
        description: "semgrep scan result"
        value: ${{ jobs.scan_source.outputs.semgrep_result }}
      bandit_result:
        description: "bandit scan result"
        value: ${{ jobs.scan_source.outputs.bandit_result }}
      npm_audit_result:
        description: "npm audit result"
        value: ${{ jobs.scan_source.outputs.npm_audit_result }}
      pip_audit_result:
        description: "pip-audit result"
        value: ${{ jobs.scan_source.outputs.pip_audit_result }}
      npm_audit_fix_branch:
        description: "fix branch created for dependabot npm audit auto-fix"
        value: ${{ jobs.dependabot-audit-fix.outputs.fix_branch }}
      npm_audit_fix_pr:
        description: "url of the auto-fix PR"
        value: ${{ jobs.dependabot-audit-fix.outputs.fix_pr_url }}
      npm_audit_clean_after_fix:
        description: "whether audit is clean after auto-fix"
        value: ${{ jobs.dependabot-audit-fix.outputs.audit_clean_after_fix }}

jobs:
  scan_source:
    name: scan source code and dependencies
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
    outputs:
      semgrep_result: ${{ steps.semgrep-check.outcome }}
      bandit_result: ${{ steps.bandit.outcome }}
      npm_audit_result: ${{ steps.npm-audit.outcome }}
      pip_audit_result: ${{ steps.pip-audit.outcome }}
    defaults:
      run:
        working-directory: ${{ inputs.root_dir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Setup Python once for all tools (Semgrep, Bandit, pip-audit)
      - name: setup python (from pyproject.toml for uv, 3.14 otherwise)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.tool == 'uv' && '' || '3.14' }}
          python-version-file:
            ${{ inputs.tool == 'uv' && format('{0}/pyproject.toml',
            inputs.root_dir) || '' }}

      # Layer 1a: Semgrep SAST (all languages)
      - name: install semgrep
        run: pip install semgrep

      - name: semgrep security scan
        id: semgrep
        env:
          SEMGREP_RULES: ${{ inputs.semgrep_rules }}
        run: |
          config_args=()
          for rule in $SEMGREP_RULES; do
            config_args+=(--config "$rule")
          done
          semgrep ci "${config_args[@]}" --sarif > semgrep.sarif
        continue-on-error: true

      - name: check semgrep results for unsuppressed findings
        id: semgrep-check
        if: always()
        run: |
          # Check if semgrep.sarif exists and is valid JSON (catches tool/config
          # errors, e.g. a bad --config; semgrep ci itself exits non-zero
          # whenever it has findings, so the step outcome alone can't be used
          # to distinguish "scan failed" from "scan found issues")
          if [ ! -s semgrep.sarif ] || ! jq empty semgrep.sarif 2>/dev/null; then
            echo "❌ No valid SARIF file generated, semgrep scan did not run correctly"
            exit 1
          fi

          # Extract findings that are NOT suppressed
          unsuppressed_count=$(jq '[.runs[].results[] | select(.suppressions == null or .suppressions == [])] | length' semgrep.sarif)
          total_count=$(jq '[.runs[].results[]] | length' semgrep.sarif)
          suppressed_count=$((total_count - unsuppressed_count))

          echo "Total findings: $total_count"
          echo "Suppressed findings: $suppressed_count"
          echo "Unsuppressed findings: $unsuppressed_count"

          if [ "$unsuppressed_count" -gt 0 ]; then
            echo "❌ Found $unsuppressed_count unsuppressed security findings that must be fixed"
            exit 1
          elif [ "$suppressed_count" -gt 0 ]; then
            echo "✅ All $suppressed_count findings are suppressed with nosemgrep comments"
            exit 0
          else
            echo "✅ No security findings detected"
            exit 0
          fi

      - name: upload semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

      # Layer 1b: Python-specific scanning
      - name: install bandit
        if: ${{ inputs.tool == 'uv' }}
        run: pip install bandit[toml]

      - name: bandit python SAST
        id: bandit
        if: ${{ inputs.tool == 'uv' }}
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . --exit-zero --severity-level medium
        continue-on-error: false

      - name: pip-audit dependency scan
        if: ${{ inputs.tool == 'uv' }}
        id: pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: ${{ inputs.root_dir }}
        continue-on-error: false

      # Layer 1c: Node.js-specific scanning
      - name: setup node for npm scanning
        if: ${{ inputs.tool == 'npm' || inputs.tool == 'yarn' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: "${{ inputs.tool }}"
          cache-dependency-path: |
            ${{ inputs.root_dir }}/package-lock.json
            ${{ inputs.root_dir }}/yarn.lock

      - name: npm audit
        id: npm-audit
        if: ${{ inputs.tool == 'npm' }}
        run: npm audit --audit-level=${{ inputs.npm_audit_severity_threshold }}${{ inputs.npm_audit_omit_dev && ' --omit=dev' || '' }}
        continue-on-error: false

      - name: yarn audit
        id: yarn-audit
        if: ${{ inputs.tool == 'yarn' }}
        run: yarn audit --level ${{ inputs.npm_audit_severity_threshold }}
        continue-on-error: false

      - name: upload security scan reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-scan-source-reports
          path: |
            ${{ inputs.root_dir }}/bandit-report.json
            ${{ inputs.root_dir }}/semgrep.sarif
          if-no-files-found: ignore

  dependabot-audit-fix:
    needs: scan_source
    if: |
      always()
      && needs.scan_source.outputs.npm_audit_result == 'failure'
      && github.actor == 'dependabot[bot]'
      && inputs.head_ref != ''
      && !startsWith(inputs.head_ref, 'audit-fix/')
    uses: ./.github/workflows/npm-audit-autofix.yml
    with:
      head_ref: ${{ inputs.head_ref }}
      root_dir: ${{ inputs.root_dir }}
      node_version: "24.16.0"
      omit_dev: ${{ inputs.npm_audit_omit_dev }}
      severity_threshold: ${{ inputs.npm_audit_severity_threshold }}
