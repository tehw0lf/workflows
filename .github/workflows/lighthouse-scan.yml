name: lighthouse scan

on:
  workflow_call:
    inputs:
      target_url:
        description: "url of the running application to audit"
        required: true
        type: string
      urls:
        description: "additional urls to audit as json array (e.g. '[\"https://example.com/about\"]')"
        default: ""
        required: false
        type: string
      min_performance:
        description: "minimum performance score (0-100)"
        default: 80
        required: false
        type: number
      min_accessibility:
        description: "minimum accessibility score (0-100)"
        default: 90
        required: false
        type: number
      min_best_practices:
        description: "minimum best-practices score (0-100)"
        default: 80
        required: false
        type: number
      min_seo:
        description: "minimum SEO score (0-100)"
        default: 80
        required: false
        type: number
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
    outputs:
      lighthouse_result:
        description: "lighthouse scan result"
        value: ${{ jobs.lighthouse.outputs.lighthouse_result }}

jobs:
  lighthouse:
    name: lighthouse audit
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    outputs:
      lighthouse_result: ${{ steps.audit.outcome }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: write lighthouserc
        run: |
          cat > .lighthouserc.json << 'RCEOF'
          {
            "ci": {
              "assert": {
                "assertions": {
                  "categories:performance": ["error", {"minScore": 0}],
                  "categories:accessibility": ["error", {"minScore": 0}],
                  "categories:best-practices": ["error", {"minScore": 0}],
                  "categories:seo": ["error", {"minScore": 0}]
                }
              }
            }
          }
          RCEOF
          jq \
            --argjson MIN_PERF "${{ inputs.min_performance }}" \
            --argjson MIN_A11Y "${{ inputs.min_accessibility }}" \
            --argjson MIN_BP "${{ inputs.min_best_practices }}" \
            --argjson MIN_SEO "${{ inputs.min_seo }}" \
            '.ci.assert.assertions."categories:performance"[1].minScore = ($MIN_PERF / 100) |
             .ci.assert.assertions."categories:accessibility"[1].minScore = ($MIN_A11Y / 100) |
             .ci.assert.assertions."categories:best-practices"[1].minScore = ($MIN_BP / 100) |
             .ci.assert.assertions."categories:seo"[1].minScore = ($MIN_SEO / 100)' \
            .lighthouserc.json > .lighthouserc.tmp.json
          mv .lighthouserc.tmp.json .lighthouserc.json

      - name: build urls list
        id: urls
        run: |
          BASE_URL="${{ inputs.target_url }}"
          EXTRA='${{ inputs.urls }}'
          if [ -n "$EXTRA" ]; then
            URLS=$(echo "$EXTRA" | jq -r '.[]')
            URLS="$BASE_URL"$'\n'"$URLS"
          else
            URLS="$BASE_URL"
          fi
          {
            echo "urls<<EOF"
            echo "$URLS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: run lighthouse
        id: audit
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # 12.6.2
        with:
          urls: ${{ steps.urls.outputs.urls }}
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: format report summary
        if: always() && steps.audit.outcome != 'skipped'
        run: |
          echo "### Lighthouse Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          MANIFEST=$(find .lighthouseci -name 'manifest.json' 2>/dev/null | head -1)
          if [ -f "$MANIFEST" ]; then
            echo "| URL | Performance | Accessibility | Best Practices | SEO |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|-------------|---------------|----------------|-----|" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] | "| \(.url) | \(.summary.performance * 100 | round)% | \(.summary.accessibility * 100 | round)% | \(.summary["best-practices"] * 100 | round)% | \(.summary.seo * 100 | round)% |"' "$MANIFEST" >> $GITHUB_STEP_SUMMARY || true
          fi
        continue-on-error: true
