name: publish python libraries

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: true
    inputs:
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
      root_dir:
        description: "path to project root"
        default: "."
        required: false
        type: string
      artifact_path:
        description: "path to artifact files to save from build step"
        default: ""
        required: false
        type: string
      tool:
        description: "build tool - uv"
        default: "uv"
        required: false
        type: string

jobs:
  publish_python_libraries:
    name: publish python libraries
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
      packages: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.root_dir }}
    steps:
      - uses: actions/checkout@v6

      - name: check build artifact existence
        uses: softwareforgood/check-artifact-v4-existence@v0
        id: check_artifact_exists
        with:
          name: build

      - name: validate artifact availability
        if: ${{ inputs.artifact_path != '' && steps.check_artifact_exists.outputs.exists != 'true' }}
        run: |
          echo "::error::[PyPI] Build artifact 'build' not found"
          echo "::error::[PyPI] Expected artifact at: ${{ inputs.artifact_path }}"
          echo "::error::[PyPI] This usually means the build step failed or didn't produce artifacts"
          echo "FAILURE_REASON=missing_artifact" >> $GITHUB_ENV
          exit 1

      - name: extract version from pyproject.toml
        if: ${{ steps.check_artifact_exists.outputs.exists == 'true' }}
        id: extract_version
        run: |
          if [[ -f pyproject.toml ]]; then
            VERSION=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)
          else
            echo "::error::[PyPI] Cannot find pyproject.toml"
            exit 1
          fi
          if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
            echo "::error::[PyPI] Could not extract version from pyproject.toml (got: '${VERSION}')"
            exit 1
          fi
          echo "release_tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "::notice::[PyPI] Extracted version: v${VERSION}"

      - name: set git tag if not yet set
        if: ${{ steps.check_artifact_exists.outputs.exists == 'true' }}
        run: |
          if git ls-remote --tags origin "${{ steps.extract_version.outputs.release_tag }}" | grep -q "${{ steps.extract_version.outputs.release_tag }}"; then
            echo "::notice::[PyPI] Tag ${{ steps.extract_version.outputs.release_tag }} already exists, skipping"
          else
            git tag "${{ steps.extract_version.outputs.release_tag }}"
            git push origin "${{ steps.extract_version.outputs.release_tag }}"
            echo "::notice::[PyPI] Created and pushed tag ${{ steps.extract_version.outputs.release_tag }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
