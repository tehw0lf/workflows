name: security scan dast

on:
  workflow_call:
    inputs:
      target_url:
        description: "url of the running application to scan"
        required: true
        type: string
      scan_type:
        description: "scan type - baseline (passive, ~5min) or full (active+passive, ~30-60min)"
        default: "baseline"
        required: false
        type: string
      rules_file:
        description: "path to ZAP rules file for suppressing known false positives (.zap/rules.tsv)"
        default: ""
        required: false
        type: string
      max_duration_minutes:
        description: "maximum scan duration in minutes for full scans (0 = unlimited)"
        default: "60"
        required: false
        type: string
      fail_on_warn:
        description: "fail the workflow on warnings (true) or only on errors (false)"
        default: "false"
        required: false
        type: boolean
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
    outputs:
      zap_result:
        description: "zap scan result"
        value: ${{ jobs.dast_scan.outputs.zap_result }}
    secrets:
      ZAP_AUTH_HEADER_VALUE:
        description: "optional auth header value (e.g. Bearer token) for authenticated scans"
        required: false

jobs:
  dast_scan:
    name: dast scan (${{ inputs.scan_type }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.scan_type == 'full' && 90 || 15 }}
    permissions:
      contents: read
      issues: write
      security-events: write
    outputs:
      zap_result: ${{ steps.zap-scan.outcome }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: zap baseline scan
        id: zap-scan
        if: ${{ inputs.scan_type == 'baseline' }}
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
          rules_file_name: ${{ inputs.rules_file }}
          issue_title: "ZAP Baseline DAST Report"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: ${{ inputs.fail_on_warn }}
          cmd_options: ${{ secrets.ZAP_AUTH_HEADER_VALUE != '' && format('-z "-config replacer.full_list(0).description=auth -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=Authorization -config replacer.full_list(0).replacement={0}"', secrets.ZAP_AUTH_HEADER_VALUE) || '' }}

      - name: zap full scan
        id: zap-full-scan
        if: ${{ inputs.scan_type == 'full' }}
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ inputs.target_url }}
          rules_file_name: ${{ inputs.rules_file }}
          issue_title: "ZAP Full DAST Report"
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: ${{ inputs.fail_on_warn }}
          cmd_options: ${{ format('-z "-config scanner.maxScanDurationInMins={0}"', inputs.max_duration_minutes) }}${{ secrets.ZAP_AUTH_HEADER_VALUE != '' && format(' -z "-config replacer.full_list(0).description=auth -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=Authorization -config replacer.full_list(0).replacement={0}"', secrets.ZAP_AUTH_HEADER_VALUE) || '' }}

      - name: upload zap report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: zap-dast-report-${{ inputs.scan_type }}
          path: |
            report_html.html
            report_json.json
          if-no-files-found: ignore

      - name: generate summary
        if: always()
        run: |
          echo "### ZAP DAST Scan Results (${{ inputs.scan_type }})" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${{ inputs.target_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan type | ${{ inputs.scan_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ steps.zap-scan.outcome || steps.zap-full-scan.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See **Issues** tab for detailed findings (auto-created by ZAP)." >> $GITHUB_STEP_SUMMARY
