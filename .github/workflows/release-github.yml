name: release artifact on github

on:
  workflow_call:
    inputs:
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
      artifact_path:
        description: "path to artifact files to save from build step"
        default: ""
        required: false
        type: string
      tool:
        description: "build tool - uv, npm, etc."
        default: "none"
        required: false
        type: string
      release_pre:
        description: "run before performing github release"
        default: ""
        required: false
        type: string
      root_dir:
        description: "path to project root (where the manifest file is)"
        default: "."
        required: false
        type: string

jobs:
  release_github:
    name: release artifact on github
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.root_dir }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: check build artifact existence
        uses: softwareforgood/check-artifact-v4-existence@v0
        id: check_artifact_exists
        with:
          name: build

      - name: download build artifact
        if: ${{ inputs.artifact_path != '' && steps.check_artifact_exists.outputs.exists == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: build
          path: ${{ inputs.artifact_path }}

      - name: extract version from manifest
        if: ${{ steps.check_artifact_exists.outputs.exists == 'true' }}
        id: extract_version
        run: |
          if [[ "${{ inputs.tool }}" == "npm" || "${{ inputs.tool }}" == "yarn" ]]; then
            VERSION=$(jq -r .version package.json)
          elif [[ "${{ inputs.tool }}" == "uv" ]]; then
            if [[ -f pyproject.toml ]]; then
              VERSION=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)
            elif [[ -f "${{ inputs.artifact_path }}/version.json" ]]; then
              VERSION=$(jq -r .version "${{ inputs.artifact_path }}/version.json")
            else
              echo "::error::[Release] Cannot find pyproject.toml or version.json for uv project"
              exit 1
            fi
          elif [[ "${{ inputs.tool }}" == "cargo" ]]; then
            VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          else
            echo "::error::[Release] Unsupported tool '${{ inputs.tool }}' for automatic version extraction"
            echo "::error::[Release] Supported tools: npm, yarn, uv, cargo"
            exit 1
          fi

          if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
            echo "::error::[Release] Could not extract version from manifest (got: '${VERSION}')"
            exit 1
          fi
          echo "release_tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "::notice::[Release] Extracted version: v${VERSION}"

      - name: set git tag if not yet set
        if: ${{ steps.check_artifact_exists.outputs.exists == 'true' }}
        run: |
          if git ls-remote --tags origin "${{ steps.extract_version.outputs.release_tag }}" | grep -q "${{ steps.extract_version.outputs.release_tag }}"; then
            echo "::warning::[Release] Tag ${{ steps.extract_version.outputs.release_tag }} already exists, skipping tag creation"
          else
            git tag "${{ steps.extract_version.outputs.release_tag }}"
            git push origin "${{ steps.extract_version.outputs.release_tag }}"
            echo "::notice::[Release] Created and pushed tag ${{ steps.extract_version.outputs.release_tag }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: check if release already exists
        if: ${{ steps.check_artifact_exists.outputs.exists == 'true' }}
        id: check_release_exists
        run: |
          if gh release view "${{ steps.extract_version.outputs.release_tag }}" &>/dev/null; then
            echo "::warning::[Release] Release ${{ steps.extract_version.outputs.release_tag }} already exists, skipping"
            echo "release_exists=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: run release pre script if present
        if: ${{ inputs.release_pre != '' && steps.check_artifact_exists.outputs.exists == 'true' && steps.check_release_exists.outputs.release_exists != 'true' }}
        run: ${{ inputs.release_pre }}

      - uses: softprops/action-gh-release@v3
        if: ${{ steps.check_artifact_exists.outputs.exists == 'true' && steps.check_release_exists.outputs.release_exists != 'true' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.extract_version.outputs.release_tag }}
          name: "Release ${{ steps.extract_version.outputs.release_tag }}"
          generate_release_notes: true
          files: |
            ${{ inputs.artifact_path }}/**/*
