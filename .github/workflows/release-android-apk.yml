name: release android apk

on:
  workflow_call:
    secrets:
      ANDROID_STOREPASS:
        required: false
    inputs:
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
      app_root:
        description: "app root"
        default: ""
        required: false
        type: string
      artifact_path:
        description: "path to artifact files to save from build step"
        default: ""
        required: false
        type: string
      tool:
        description: "build tool - npm or yarn"
        default: "none"
        required: false
        type: string

jobs:
  release_android_apk:
    name: release android apk
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: check app artifact existence
        uses: softwareforgood/check-artifact-v4-existence@f988c59be23773bdf226dffa5720d85a13501fba # v0.4.3
        id: check_app_artifact_exists
        with:
          name: app

      - name: download app artifact
        if: ${{ inputs.app_root != '' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app
          path: ${{ inputs.app_root }}

      - name: check build artifact existence
        uses: softwareforgood/check-artifact-v4-existence@f988c59be23773bdf226dffa5720d85a13501fba # v0.4.3
        id: check_build_artifact_exists
        with:
          name: build

      - name: download build artifact
        if: ${{ inputs.artifact_path != '' && steps.check_build_artifact_exists.outputs.exists == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: ${{ inputs.artifact_path }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ (inputs.tool == 'npm' || inputs.tool == 'yarn') && steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        with:
          node-version: "24.16.0"
          cache: "${{ inputs.tool }}"

      - name: install with npm
        if: ${{ inputs.tool == 'npm' && steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        run: npm ci

      - name: cache keystore
        if: ${{ steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache
        with:
          path: ${{ inputs.app_root }}/android/app/keystore.jks
          key: keystore-cache

      - name: generate keystore
        if: ${{ steps.cache.outputs.cache-hit != 'true' && steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true'}}
        id: generate-keystore
        run: |
          keytool -genkeypair -v \
            -keystore ${{ inputs.app_root }}/android/app/keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias my-key \
            -storepass "$ANDROID_STOREPASS" \
            -dname "CN=Android, OU=Development, O=App"
        env:
          ANDROID_STOREPASS: ${{ secrets.ANDROID_STOREPASS }}

      - name: set up jdk
        if: ${{ steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: "adopt"
          java-version: "24"

      - name: set up android sdk
        if: ${{ steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: "build-tools;35.0.0"

      - name: build apk
        if: ${{ steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        run: |
          cd ${{ inputs.app_root }}/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: sign apk
        if: ${{ success() && hashFiles('./nx.json') != '' && steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true'}}
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore ${{ inputs.app_root }}/android/app/keystore.jks \
            -storepass "$ANDROID_STOREPASS" \
            -keypass "$ANDROID_STOREPASS" \
            ${{ inputs.app_root }}/android/app/build/outputs/apk/release/app-release-unsigned.apk my-key
        env:
          ANDROID_STOREPASS: ${{ secrets.ANDROID_STOREPASS }}

      - name: align apk
        if: ${{ success() && hashFiles('./nx.json') != '' && steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true'}}
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/35.0.0/zipalign -v 4 \
            ${{ inputs.app_root }}/android/app/build/outputs/apk/release/app-release-unsigned.apk \
            ${{ inputs.app_root }}/android/app/build/outputs/apk/release/app-release.apk

      - name: extract version from package.json
        if: ${{ steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        run: |
          VERSION=$(jq -r .version package.json)
          if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
            echo "::error::[Release] Could not extract version from package.json (got: '${VERSION}')"
            exit 1
          fi
          echo "RELEASE_TAG=v${VERSION}" >> $GITHUB_ENV
          echo "::notice::[Release] Extracted version: v${VERSION}"

      - name: set git tag if not yet set
        if: ${{ steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        run: |
          if git ls-remote --tags origin "${{ env.RELEASE_TAG }}" | grep -q "${{ env.RELEASE_TAG }}"; then
            echo "::warning::[Release] Tag ${{ env.RELEASE_TAG }} already exists, skipping tag creation"
          else
            git tag "${{ env.RELEASE_TAG }}"
            git push origin "${{ env.RELEASE_TAG }}"
            echo "::notice::[Release] Created and pushed tag ${{ env.RELEASE_TAG }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: check if release already exists
        if: ${{ steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' }}
        id: check_release_exists
        run: |
          if gh release view "${{ env.RELEASE_TAG }}" &>/dev/null; then
            echo "::warning::[Release] Release ${{ env.RELEASE_TAG }} already exists, skipping"
            echo "release_exists=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        if: ${{ steps.check_build_artifact_exists.outputs.exists == 'true' && steps.check_app_artifact_exists.outputs.exists == 'true' && steps.check_release_exists.outputs.release_exists != 'true' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Release ${{ env.RELEASE_TAG }}"
          generate_release_notes: true
          files: |
            ${{ inputs.app_root }}/android/app/build/outputs/apk/release/app-release.apk
