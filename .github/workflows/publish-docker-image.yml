name: publish docker image

on:
  workflow_call:
    inputs:
      root_dir:
        description: "path to project root"
        default: "."
        required: false
        type: string
      runner:
        description: "workflow-runner"
        default: "ubuntu-latest"
        required: false
        type: string
      artifact_path:
        description: "path to artifact files to save from build step"
        default: ""
        required: false
        type: string
      docker_meta:
        description: "docker metadata as json array ([{'name':'docker-image-name','file':'docker/app/Dockerfile'}])"
        default: ""
        required: false
        type: string
      platforms:
        description: "platforms to build the docker image for, separated by comma"
        default: "linux/amd64,linux/arm64"
        required: false
        type: string
      registry:
        description: "registry"
        required: false
        type: string
        default: "ghcr.io"
      docker_namespace:
        description: "docker namespace"
        required: false
        type: string
        default: "tehw0lf"
      docker_pre:
        description: "run before building docker image"
        default: ""
        required: false
        type: string
      tool:
        description: "build tool - uv, npm, yarn, cargo, etc."
        default: "none"
        required: false
        type: string

jobs:
  publish_docker_image:
    name: publish docker image
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
      packages: write
    defaults:
      run:
        working-directory: ${{ inputs.root_dir }}
    strategy:
      fail-fast: false
      matrix:
        docker: ${{ fromJson(inputs.docker_meta) }}
    steps:
      - uses: actions/checkout@v6

      - name: validate docker metadata
        if: ${{ inputs.docker_meta != '' }}
        run: |
          if ! echo '${{ inputs.docker_meta }}' | jq . > /dev/null 2>&1; then
            echo "::error::[Docker] Invalid input 'docker_meta': not valid JSON"
            echo "::error::[Docker] Expected: [{'name':'image-name','file':'path/to/Dockerfile'}]"
            echo "::error::[Docker] Received: ${{ inputs.docker_meta }}"
            echo "FAILURE_REASON=invalid_input" >> $GITHUB_ENV
            exit 3
          fi
          echo "::notice::[Docker] Building images: $(echo '${{ inputs.docker_meta }}' | jq -r '.[].name' | tr '\n' ' ')"
        shell: bash

      - name: check build artifact existence
        uses: softwareforgood/check-artifact-v4-existence@v0
        id: check_artifact_exists
        with:
          name: build

      - name: download build artifact
        if: ${{ inputs.artifact_path != '' && steps.check_artifact_exists.outputs.exists == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: build
          path: ${{ inputs.artifact_path }}

      - name: extract version for docker tag
        if: ${{ inputs.artifact_path == '' || steps.check_artifact_exists.outputs.exists == 'true' }}
        run: |
          if [[ "${{ inputs.tool }}" == "npm" || "${{ inputs.tool }}" == "yarn" ]]; then
            VERSION=$(jq -r .version package.json)
          elif [[ "${{ inputs.tool }}" == "uv" ]]; then
            VERSION=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)
          elif [[ "${{ inputs.tool }}" == "cargo" ]]; then
            VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          elif [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9] ]]; then
            VERSION="${{ github.ref_name }}"
          fi

          if [[ -n "${VERSION}" && "${VERSION}" != "null" ]]; then
            echo "DOCKER_VERSION_TAG=v${VERSION#v}" >> $GITHUB_ENV
            echo "::notice::[Docker] Version tag: v${VERSION#v}"
          else
            echo "::notice::[Docker] No version found, publishing latest only"
          fi

      - name: set git tag if not yet set
        if: ${{ env.DOCKER_VERSION_TAG != '' && (inputs.artifact_path == '' || steps.check_artifact_exists.outputs.exists == 'true') && matrix.docker.name == fromJson(inputs.docker_meta)[0].name }}
        run: |
          if git ls-remote --tags origin "${{ env.DOCKER_VERSION_TAG }}" | grep -q "${{ env.DOCKER_VERSION_TAG }}"; then
            echo "::warning::[Docker] Tag ${{ env.DOCKER_VERSION_TAG }} already exists, skipping tag creation"
          else
            git tag "${{ env.DOCKER_VERSION_TAG }}"
            git push origin "${{ env.DOCKER_VERSION_TAG }}"
            echo "::notice::[Docker] Created and pushed tag ${{ env.DOCKER_VERSION_TAG }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: run docker pre script
        if: ${{ inputs.docker_pre != '' && (inputs.artifact_path == '' || steps.check_artifact_exists.outputs.exists == 'true') }}
        run: ${{ inputs.docker_pre }}

      - name: set up docker
        if: ${{ inputs.artifact_path == '' || steps.check_artifact_exists.outputs.exists == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: login
        if: ${{ inputs.artifact_path == '' || steps.check_artifact_exists.outputs.exists == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: check if version tag already exists
        if: ${{ env.DOCKER_VERSION_TAG != '' && (inputs.artifact_path == '' || steps.check_artifact_exists.outputs.exists == 'true') }}
        run: |
          if docker manifest inspect "${{ inputs.registry }}/${{ inputs.docker_namespace }}/${{ matrix.docker.name }}:${{ env.DOCKER_VERSION_TAG }}" > /dev/null 2>&1; then
            echo "::warning::[Docker] Tag ${{ env.DOCKER_VERSION_TAG }} already exists in registry, publishing latest only"
            echo "DOCKER_VERSION_TAG=" >> $GITHUB_ENV
          fi

      - name: build and push image
        if: ${{ inputs.artifact_path == '' || steps.check_artifact_exists.outputs.exists == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.docker.file }}
          push: true
          platforms: ${{ inputs.platforms }}
          tags: |
            ${{ inputs.registry }}/${{ inputs.docker_namespace }}/${{ matrix.docker.name }}:latest
            ${{ env.DOCKER_VERSION_TAG != '' && format('{0}/{1}/{2}:{3}', inputs.registry, inputs.docker_namespace, matrix.docker.name, env.DOCKER_VERSION_TAG) || '' }}
